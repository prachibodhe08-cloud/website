<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Pills Tabs</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-4">

  <!-- Nav Pills -->
  <ul class="nav nav-pills nav-fill gap-2 p-1 small bg-primary rounded-5 shadow-sm"
      id="pillNav2"
      role="tablist"
      style="--bs-nav-link-color: var(--bs-white);
             --bs-nav-pills-link-active-color: var(--bs-primary);
             --bs-nav-pills-link-active-bg: var(--bs-white);">

    <li class="nav-item">
      <button class="nav-link active rounded-5"
              id="home-tab"
              data-bs-toggle="tab"
              data-bs-target="#home"
              type="button"
              role="tab">
        Home
      </button>
    </li>

    <li class="nav-item">
      <button class="nav-link rounded-5"
              id="profile-tab"
              data-bs-toggle="tab"
              data-bs-target="#profile"
              type="button"
              role="tab">
        Profile
      </button>
    </li>

    <li class="nav-item">
      <button class="nav-link rounded-5"
              id="contact-tab"
              data-bs-toggle="tab"
              data-bs-target="#contact"
              type="button"
              role="tab">
        Contact
      </button>
    </li>

  </ul>

  <!-- Tab Content -->
  <div class="tab-content mt-3">

    <div class="tab-pane fade show active" id="home" role="tabpanel">
      <h4>Home</h4>
      <p>Home tab content goes here.</p>
    </div>

    <div class="tab-pane fade" id="profile" role="tabpanel">
      <h4>Profile</h4>
      <p>Profile tab content goes here.</p>
    </div>

    <div class="tab-pane fade" id="contact" role="tabpanel">
      <h4>Contact</h4>
      <p>Contact tab content goes here.</p>
    </div>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your custom JS -->
<script src="script.js"></script>

</body>
</html>
